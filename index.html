* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pink: #ff69b4;
  --hot: #ff1493;
  --dark: #1a001a;
  --glow: #ff00ff;
}

body {
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier Prime', monospace;
  overflow-x: hidden;
  position: relative;
  padding: 1.5rem 1rem;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

.header {
  text-align: center;
  margin-bottom: 1.5rem;
  animation: flicker 4s infinite;
}
.header h1 {
  font-size: clamp(1rem, 5vw, 2rem);
  color: var(--pink);
  text-shadow: 0 0 8px var(--glow), 0 0 20px var(--hot);
  letter-spacing: 0.15em;
  text-transform: lowercase;
}
.header p {
  font-size: clamp(0.6rem, 2vw, 0.75rem);
  color: rgba(255,105,180,0.5);
  letter-spacing: 0.3em;
  margin-top: 0.4rem;
}

.video-wrap {
  position: relative;
  width: min(640px, 92vw);
  border: 2px solid var(--pink);
  box-shadow: 0 0 12px var(--hot), 0 0 40px rgba(255,0,255,0.2);
  background: #000;
}
.video-wrap::before,
.video-wrap::after {
  content: '✦';
  position: absolute;
  top: -14px;
  font-size: 18px;
  color: var(--pink);
  text-shadow: 0 0 8px var(--glow);
}
.video-wrap::before { left: -6px; }
.video-wrap::after  { right: -6px; }

.video-wrap video {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: contain;
  background: #000;
}

.sound-btn {
  position: fixed;
  top: 10px; left: 10px;
  z-index: 1000;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(26,0,26,0.85);
  border: 1.5px solid var(--pink);
  box-shadow: 0 0 6px var(--hot);
  cursor: pointer;
  display: grid;
  place-items: center;
  font-size: 17px;
  transition: transform 0.1s;
  user-select: none;
}
.sound-btn:active { transform: scale(0.93); }
.sound-btn.muted  { border-color: #555; box-shadow: none; }

.forgive-wrap {
  margin-top: 1.8rem;
  text-align: center;
}

#forgive-btn {
  font-family: 'Courier Prime', monospace;
  font-size: clamp(0.95rem, 3vw, 1.1rem);
  padding: 0.7rem 2.2rem;
  background: transparent;
  color: var(--pink);
  border: 2px solid var(--pink);
  box-shadow: 0 0 8px var(--hot), inset 0 0 8px rgba(255,20,147,0.1);
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: lowercase;
  transition: all 0.2s;
}
#forgive-btn:hover {
  background: rgba(255,105,180,0.1);
  box-shadow: 0 0 18px var(--hot), inset 0 0 18px rgba(255,20,147,0.2);
}
#forgive-btn:active { transform: scale(0.97); }
#forgive-btn.clicked {
  color: #fff;
  border-color: #fff;
  box-shadow: 0 0 24px #fff, 0 0 60px var(--glow);
  animation: pulse 0.6s ease;
}

.response-text {
  margin-top: 1rem;
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  color: #fff;
  text-shadow: 0 0 10px var(--glow), 0 0 30px var(--hot);
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  min-height: 2rem;
}
.response-text.visible {
  opacity: 1;
  transform: translateY(0);
}

.footer {
  margin-top: 2.5rem;
  font-size: clamp(0.55rem, 1.8vw, 0.65rem);
  color: rgba(255,105,180,0.3);
  letter-spacing: 0.25em;
  text-align: center;
}

.rose {
  position: fixed;
  top: -60px;
  pointer-events: none;
  z-index: 100;
  animation: fall linear forwards;
  filter: drop-shadow(0 0 4px rgba(255,0,128,0.6));
}

/* ✨ NEW: sparkle */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 50;
  color: var(--pink);
  text-shadow: 0 0 6px var(--glow), 0 0 12px var(--hot);
  animation: sparkleBlink 1.8s infinite ease-in-out;
  opacity: 0;
}

@keyframes sparkleBlink {
  0%, 100% { opacity: 0; transform: scale(0.6) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
}

@keyframes fall {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(110vh) rotate(360deg); }
}

@keyframes flicker {
  0%,100% { opacity: 1; }
  93%     { opacity: 0.6; }
  96%     { opacity: 0.8; }
}

@keyframes pulse {
  0%   { box-shadow: 0 0 0 #fff; }
  50%  { box-shadow: 0 0 40px #fff, 0 0 80px var(--glow); }
  100% { box-shadow: 0 0 8px var(--hot); }
}

<body>

<button class="sound-btn muted" id="sound-btn">🔇</button>

<div class="header">
  <h1>-- vergibst du mir? --</h1>
  <p>wäre assi wenn nicht lowkey</p>
</div>

<div class="video-wrap">
  <video id="main-video" src="ressources/TheyDontDoItLikeThisAnymore.mp4" autoplay muted loop playsinline controls></video>
</div>

<div class="forgive-wrap">
  <button id="forgive-btn">ja 🌹</button>
  <div class="response-text" id="response-text"></div>
</div>

<div class="footer">✦ made with love and too many roses ✦</div>

<script>
const vid = document.getElementById('main-video')
const soundBtn = document.getElementById('sound-btn')
let isMuted = true

soundBtn.addEventListener('click', () => {
  isMuted = !isMuted
  vid.muted = isMuted
  soundBtn.textContent = isMuted ? '🔇' : '🔊'
  soundBtn.classList.toggle('muted', isMuted)
})

document.addEventListener('click', () => {
  vid.muted = false
  vid.play().catch(() => {})
  soundBtn.textContent = '🔊'
  soundBtn.classList.remove('muted')
}, { once: true })

const forgiveBtn = document.getElementById('forgive-btn')
const responseEl = document.getElementById('response-text')
let forgiven = false

forgiveBtn.addEventListener('click', () => {
  if (forgiven) return
  forgiven = true
  forgiveBtn.classList.add('clicked')
  forgiveBtn.textContent = 'danke 🌹'
  responseEl.textContent = 'cool :)'
  responseEl.classList.add('visible')
  launchRoses(30)
})

const ROSES = ['🌹','🥀','🌸','💮','🌺']

function spawnRose() {
  const el = document.createElement('span')
  el.className = 'rose'
  el.textContent = ROSES[Math.floor(Math.random() * ROSES.length)]
  el.style.left = Math.random() * 98 + 'vw'
  const dur = 2.5 + Math.random() * 2.5
  el.style.animationDuration = dur + 's'
  document.body.appendChild(el)
  setTimeout(() => el.remove(), dur * 1000)
}

function launchRoses(n) {
  for (let i = 0; i < n; i++) setTimeout(spawnRose, i * 60)
}

// ✨ NEW: glitter
const SPARKLES = ['✦','✧','⋆','★','☆']

function spawnSparkle() {
  const el = document.createElement('span')
  el.className = 'sparkle'
  el.textContent = SPARKLES[Math.floor(Math.random() * SPARKLES.length)]
  el.style.left = Math.random() * 100 + 'vw'
  el.style.top = Math.random() * 100 + 'vh'
  el.style.fontSize = (8 + Math.random() * 14) + 'px'
  const dur = 1.5 + Math.random() * 2
  el.style.animationDuration = dur + 's'
  document.body.appendChild(el)
  setTimeout(() => el.remove(), dur * 1000)
}

setInterval(() => {
  spawnSparkle()
  if (Math.random() < 0.6) spawnSparkle()
}, 400)
</script>

</body>
